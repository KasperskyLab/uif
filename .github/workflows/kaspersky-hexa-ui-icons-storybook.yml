# Build and deploy Storybook for @kaspersky/hexa-ui-icons to GitHub Pages (monorepo).

name: "[storybook] @kaspersky/hexa-ui-icons"

on:
  push:
    branches:
      - "master"
    paths:
      - "packages/kaspersky-hexa-ui-icons/**"
      - ".github/workflows/kaspersky-hexa-ui-icons-storybook.yml"
  workflow_dispatch:

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook --workspace=@kaspersky/hexa-ui-icons

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/kaspersky-hexa-ui-icons/storybook/hexa-ui-icons
          destination_dir: hexa-ui-icons
