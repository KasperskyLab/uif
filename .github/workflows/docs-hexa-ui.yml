# Build and deploy docs/hexa-ui to GitHub Pages (monorepo).

name: "Docs: hexa-ui"

on:
  push:
    branches:
      - "master"
    paths:
      - "docs/hexa-ui/**"
      - ".github/workflows/docs-hexa-ui.yml"
  workflow_dispatch:

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=hexa-ui-docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/hexa-ui/dist
          destination_dir: docs/hexa-ui
